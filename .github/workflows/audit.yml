name: Supply-chain audit

# CANONICAL TEMPLATE -- mirrored from edamame_rules/supply-chain/audit.yml.template
# by edamame_rules/supply-chain/sync.sh. Do not edit per-repo copies; edit the
# template and re-run sync.sh.

on:
  pull_request:
    branches: ["*"]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/audit.yml'
  push:
    branches:
      - 'dev'
      - 'main'
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/audit.yml'
  schedule:
    # Daily at 04:00 UTC: catches advisories that land against an unchanged
    # lockfile (RustSec database update), and detects per-repo drift of
    # deny.toml against the canonical edamame_rules/supply-chain/deny.toml.
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  cargo-deny:
    name: cargo-deny (${{ matrix.checks }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - licenses
          - bans
          - sources
    # Self-hosted runners are not needed: cargo-deny only reads Cargo.toml /
    # Cargo.lock and does NOT need any private dep to resolve. We stay on
    # github-hosted ubuntu-latest so the gate is fast and cheap, but the
    # job still has to be able to `actions/checkout@v4` the host repo --
    # which is `edamametechnologies/<repo>` and therefore subject to the
    # org IP allow list. Setup EDAMAME Posture (connected mode) lifts the
    # allow list for the runner IP for the duration of the job; see
    # edamame_app/.cursor/rules/workspace.mdc "Org IP Allow List Lift on
    # Github-Hosted Runners (MUST follow)" for the full policy.
    #
    # The job ALSO has to satisfy the github-hosted runner-protection
    # invariant (`Github-Hosted Runners (Enforced Gate)` in the same
    # workspace rule): vulnerability_detection ON + agentic_mode analyze
    # + a trailing exit_on_vulnerability_findings: true gate. The audit
    # job is a shallow TOML-only check, but the rule applies to every
    # github-hosted runner job that touches a private edamametechnologies
    # repo, not just full test workflows.
    steps:
      - name: Setup EDAMAME Posture
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-audit-${{ matrix.checks }}
          checkout: true
          wait_for_api: true
          packet_capture: true
          vulnerability_detection: true
          vulnerability_detection_interval: "60"
          agentic_mode: analyze
          agentic_provider: edamame
          agentic_interval: 600
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}

      - name: Install cargo-deny
        # Pinned to a known-good release. Bump deliberately, not via Renovate.
        run: |
          set -euo pipefail
          version="0.18.5"
          url="https://github.com/EmbarkStudios/cargo-deny/releases/download/${version}/cargo-deny-${version}-x86_64-unknown-linux-musl.tar.gz"
          curl --proto '=https' --tlsv1.2 -fsSL "$url" -o /tmp/cargo-deny.tgz
          sudo tar -C /usr/local/bin --strip-components=1 -xzf /tmp/cargo-deny.tgz "cargo-deny-${version}-x86_64-unknown-linux-musl/cargo-deny"
          cargo-deny --version

      - name: Run cargo-deny check ${{ matrix.checks }}
        run: cargo-deny --all-features check ${{ matrix.checks }}

      - name: EDAMAME Posture vulnerability gate
        if: always()
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          dump_vulnerability_findings: true
          exit_on_vulnerability_findings: true

  drift-check:
    # Verifies the local deny.toml has not drifted from the canonical
    # edamame_rules/supply-chain/deny.toml. Runs on the daily schedule and
    # on every push -- a manual edit to per-repo deny.toml will trip this
    # gate and force a re-sync via edamame_rules/supply-chain/sync.sh.
    name: deny.toml drift check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      # The audit job is a TOML-only check, but the workspace rule
      # `Org IP Allow List Lift on Github-Hosted Runners (MUST follow)`
      # applies to every github-hosted runner job that calls
      # `actions/checkout` against a private edamametechnologies repo --
      # which is exactly what this job does (twice: this repo + the
      # edamame_rules repo). Posture comes first with checkout=false so
      # we can keep the explicit two-checkout layout (path: repo + path:
      # edamame_rules) the drift comparison needs.
      - name: Setup EDAMAME Posture
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          edamame_user: ${{ vars.EDAMAME_POSTURE_USER }}
          edamame_domain: ${{ vars.EDAMAME_POSTURE_DOMAIN }}
          edamame_pin: ${{ secrets.EDAMAME_POSTURE_PIN }}
          edamame_id: ${{ github.run_id }}-audit-drift
          checkout: false
          wait_for_api: true
          packet_capture: true
          vulnerability_detection: true
          vulnerability_detection_interval: "60"
          agentic_mode: analyze
          agentic_provider: edamame
          agentic_interval: 600
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}

      - uses: actions/checkout@v4
        with:
          path: repo

      - name: Checkout edamame_rules
        uses: actions/checkout@v4
        with:
          repository: edamametechnologies/edamame_rules
          path: edamame_rules
          ref: main

      - name: Verify deny.toml matches canonical source
        run: |
          set -euo pipefail
          if ! diff -u edamame_rules/supply-chain/deny.toml repo/deny.toml; then
            echo "ERROR: deny.toml has drifted from edamame_rules/supply-chain/deny.toml"
            echo "Run: cd edamame_rules/supply-chain && ./sync.sh"
            exit 1
          fi
          echo "OK: deny.toml is in sync with canonical source."

      - name: EDAMAME Posture vulnerability gate
        if: always()
        uses: edamametechnologies/edamame_posture_action@v1
        with:
          dump_vulnerability_findings: true
          exit_on_vulnerability_findings: true
